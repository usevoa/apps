<svg xmlns="http://www.w3.org/2000/svg" width="400" height="620" viewBox="0 0 400 620" fill="none">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="toggleOn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="400" height="620" rx="20"/>
    </clipPath>
  </defs>

  <!-- Window -->
  <g filter="shadow" clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="400" height="620" rx="20" fill="#F8FAFC"/>

    <!-- Content area -->
    <g transform="translate(14, 12)">

      <!-- Header Card -->
      <rect x="0" y="0" width="372" height="64" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="28" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="16" font-weight="700" fill="#0F172A">moovoa</text>
      <!-- Status dot + text -->
      <circle cx="20" cy="44" r="4" fill="#22C55E"/>
      <text x="30" y="48" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="12" fill="#94A3B8">Active — next in 23s</text>
      <!-- Shortcut -->
      <text x="262" y="32" font-family="ui-monospace,monospace" font-size="10" fill="#CBD5E1">⌃⌥A</text>
      <!-- Toggle -->
      <rect x="310" y="20" width="48" height="28" rx="14" fill="url(#toggleOn)"/>
      <circle cx="344" cy="34" r="11" fill="#fff"/>

      <!-- Movement Mode Card -->
      <rect x="0" y="72" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="101" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Movement</text>
      <!-- Segmented control -->
      <rect x="162" y="82" width="196" height="28" rx="6" fill="#F1F5F9"/>
      <rect x="164" y="84" width="62" height="24" rx="5" fill="#fff" stroke="#E2E8F0" stroke-width="0.5"/>
      <text x="180" y="101" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" font-weight="500" fill="#0F172A">Normal</text>
      <text x="243" y="101" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#94A3B8">Smart</text>
      <text x="306" y="101" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#94A3B8">Stealth</text>

      <!-- Silent Mode Card -->
      <rect x="0" y="128" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="157" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Silent Mode</text>
      <text x="90" y="157" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="8" font-weight="700" fill="#0891B2" letter-spacing="0.5">PRO</text>
      <rect x="310" y="138" width="48" height="28" rx="14" fill="url(#toggleOn)"/>
      <circle cx="344" cy="152" r="11" fill="#fff"/>

      <!-- Start After Card -->
      <rect x="0" y="184" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="213" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Start After</text>
      <rect x="278" y="194" width="80" height="28" rx="6" fill="#F1F5F9"/>
      <text x="300" y="213" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="12" fill="#64748B">10 sec</text>

      <!-- Move Every Card -->
      <rect x="0" y="240" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="269" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Move Every</text>
      <rect x="278" y="250" width="80" height="28" rx="6" fill="#F1F5F9"/>
      <text x="300" y="269" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="12" fill="#64748B">30 sec</text>

      <!-- Caffeine Mode Card -->
      <rect x="0" y="296" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="325" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Caffeine Mode</text>
      <text x="111" y="325" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="8" font-weight="700" fill="#0891B2" letter-spacing="0.5">PRO</text>
      <rect x="310" y="306" width="48" height="28" rx="14" fill="#E2E8F0"/>
      <circle cx="324" cy="320" r="11" fill="#fff"/>

      <!-- Min. Battery Card -->
      <rect x="0" y="352" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="381" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Min. Battery</text>
      <text x="108" y="381" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="8" font-weight="700" fill="#0891B2" letter-spacing="0.5">PRO</text>
      <!-- Slider -->
      <rect x="210" y="373" width="110" height="4" rx="2" fill="#E2E8F0"/>
      <rect x="210" y="373" width="44" height="4" rx="2" fill="#0891B2"/>
      <circle cx="254" cy="375" r="7" fill="#fff" stroke="#0891B2" stroke-width="2"/>
      <text x="334" y="381" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#64748B">20%</text>

      <!-- Schedule Card -->
      <rect x="0" y="408" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <text x="14" y="437" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Schedule</text>
      <text x="78" y="437" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="8" font-weight="700" fill="#0891B2" letter-spacing="0.5">PRO</text>
      <rect x="310" y="418" width="48" height="28" rx="14" fill="#E2E8F0"/>
      <circle cx="324" cy="432" r="11" fill="#fff"/>

      <!-- License Card -->
      <rect x="0" y="464" width="372" height="48" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="1"/>
      <circle cx="22" cy="488" r="8" fill="none" stroke="#22C55E" stroke-width="2"/>
      <path d="M18 488 L21 491 L27 485" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="492" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="13" font-weight="500" fill="#0F172A">Pro activated</text>
      <text x="296" y="492" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#94A3B8">Deactivate</text>

      <!-- Bottom Bar -->
      <g transform="translate(0, 528)">
        <text x="4" y="16" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#94A3B8">⚙ Settings</text>
        <text x="152" y="16" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="10" fill="#CBD5E1">moovoa v1.0</text>
        <text x="340" y="16" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-size="11" fill="#94A3B8">Quit</text>
      </g>

    </g>
  </g>
</svg>
